{% extends "base.html" %}

{% block title %}SmartQuiz – Admin Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow border-0 border-top border-4 border-danger">
      <div class="card-body p-4 p-lg-5">
        <div class="text-center mb-4">
          <div class="display-5 text-danger mb-2">
            <i class="fa-solid fa-shield-halved"></i>
          </div>
          <h2 class="fw-bold">Admin Login</h2>
          <p class="text-muted">Restricted access — admins only.</p>
        </div>

        <form id="adminLoginForm" method="POST" action="{{ url_for('admin_login') }}" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label fw-semibold">Admin Email</label>
            <div class="input-group">
              <span class="input-group-text text-danger">
                <i class="fa-solid fa-envelope"></i>
              </span>
              <input type="email" class="form-control" id="email" name="email"
                     placeholder="admin@quiz.com" required
                     value="{{ request.form.get('email', '') }}" />
              <div class="invalid-feedback">Please enter the admin email.</div>
            </div>
          </div>

          <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Admin Password</label>
            <div class="input-group">
              <span class="input-group-text text-danger">
                <i class="fa-solid fa-key"></i>
              </span>
              <input type="password" class="form-control" id="password"
                     name="password" placeholder="Admin password" required />
              <button class="btn btn-outline-secondary" type="button" id="togglePwd">
                <i class="fa-solid fa-eye" id="eyeIcon"></i>
              </button>
              <div class="invalid-feedback">Please enter the admin password.</div>
            </div>
          </div>

          <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
            <i class="fa-solid fa-shield-check me-2"></i>Sign In as Admin
          </button>
        </form>

        <hr class="my-4" />
        <p class="text-center mb-0 small text-muted">
          Student?
          <a href="{{ url_for('login') }}">Go to student login</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
  document.getElementById("togglePwd").addEventListener("click", function () {
    const pwd = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");
    if (pwd.type === "password") {
      pwd.type = "text";
      eyeIcon.className = "fa-solid fa-eye-slash";
    } else {
      pwd.type = "password";
      eyeIcon.className = "fa-solid fa-eye";
    }
  });

  document.getElementById("adminLoginForm").addEventListener("submit", function (e) {
    if (!this.checkValidity()) {
      e.preventDefault();
      e.stopPropagation();
    }
    this.classList.add("was-validated");
  });
</script>
{% endblock %}
